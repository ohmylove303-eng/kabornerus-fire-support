# 우루루쾅 화력운용 시스템 — Docker Compose v1.0
# 사용법:
#   기본(CPU): docker-compose up --build
#   GPU:       docker-compose --profile gpu up --build
#   백그라운드: docker-compose up -d

version: "3.9"

services:

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 백엔드 (FastAPI + YOLOv8 ONNX)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - PYTHON_VERSION=3.11
    container_name: ururukwang-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-ururukwang-dev-secret-key-32chars!!}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=480
      - DEMO_MODE=${DEMO_MODE:-true}
      - MODEL_PATH=/app/ai/models/ururukwang_v1.onnx
      - MAX_DRONES=8
      - LOG_LEVEL=info
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      - ururukwang-models:/app/ai/models
      - ururukwang-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ururukwang-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8G
        reservations:
          memory: 2G

  # GPU 프로필 (nvidia-docker 필요)
  backend-gpu:
    extends:
      service: backend
    container_name: ururukwang-backend-gpu
    profiles: ["gpu"]
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - USE_GPU=true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 프론트엔드 (React + Nginx)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8000
        - REACT_APP_CESIUM_ION_TOKEN=${CESIUM_ION_TOKEN:-}
    container_name: ururukwang-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ururukwang-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 데모 드론 시뮬레이터
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  drone-simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ururukwang-drone-sim
    restart: unless-stopped
    command: >
      python scripts/demo_drone_simulator.py
      --backend-url ws://backend:8000
      --drone-ids URQ-01,URQ-02
      --fps 15
      --demo-video /app/demo/sample_military.mp4
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./demo:/app/demo
    networks:
      - ururukwang-net
    profiles: ["demo"]

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Redis (세션 캐시 / 미래 확장)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  redis:
    image: redis:7-alpine
    container_name: ururukwang-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - ururukwang-redis:/data
    networks:
      - ururukwang-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    profiles: ["full"]

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 네트워크 / 볼륨
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
networks:
  ururukwang-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  ururukwang-models:
    driver: local
  ururukwang-logs:
    driver: local
  ururukwang-redis:
    driver: local
